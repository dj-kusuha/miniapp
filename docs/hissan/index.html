<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筆算ドリルメーカー</title>
    <!-- Tailwind CSS をCDNから読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 印刷時のスタイル調整 */
        @media print {
            body {
                background-color: white !important;
            }
        }
    </style>
</head>

<body class="min-h-screen bg-slate-100 print:bg-white text-gray-800 font-sans pb-12">

    <!-- ===== コントロールパネル（印刷時は非表示） ===== -->
    <div class="print:hidden sticky top-0 z-10 bg-white shadow-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">

                <div class="flex items-center gap-2 text-indigo-600 font-bold text-xl">
                    <!-- FileText Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="w-6 h-6">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <line x1="10" y1="9" x2="8" y2="9"></line>
                    </svg>
                    <h1>筆算ドリルメーカー</h1>
                </div>

                <div class="flex flex-wrap items-end gap-4 text-sm bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <!-- 演算子選択 -->
                    <div class="flex flex-col">
                        <label class="text-xs text-slate-500 font-semibold mb-1 flex items-center gap-1">
                            <!-- Settings Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="w-3 h-3">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path
                                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                                </path>
                            </svg>
                            計算の種類
                        </label>
                        <div class="flex gap-2">
                            <label
                                class="flex items-center gap-1 bg-white px-3 py-1.5 rounded border border-slate-300 cursor-pointer hover:bg-slate-50 transition-colors">
                                <input type="radio" name="operator" value="+" checked class="text-indigo-600" />
                                <span class="font-bold text-lg leading-none mt-1">＋</span>
                            </label>
                            <label
                                class="flex items-center gap-1 bg-white px-3 py-1.5 rounded border border-slate-300 cursor-pointer hover:bg-slate-50 transition-colors">
                                <input type="radio" name="operator" value="-" class="text-indigo-600" />
                                <span class="font-bold text-lg leading-none mt-1">−</span>
                            </label>
                            <label
                                class="flex items-center gap-1 bg-white px-3 py-1.5 rounded border border-slate-300 cursor-pointer hover:bg-slate-50 transition-colors">
                                <input type="radio" name="operator" value="*" class="text-indigo-600" />
                                <span class="font-bold text-lg leading-none mt-1">×</span>
                            </label>
                        </div>
                    </div>

                    <!-- 桁数選択（上の数） -->
                    <div class="flex flex-col">
                        <label class="text-xs text-slate-500 font-semibold mb-1">上の数の桁数</label>
                        <select id="digits1"
                            class="bg-white border border-slate-300 rounded px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="1">1桁</option>
                            <option value="2" selected>2桁</option>
                            <option value="3">3桁</option>
                        </select>
                    </div>

                    <!-- 桁数選択（下の数） -->
                    <div class="flex flex-col">
                        <label class="text-xs text-slate-500 font-semibold mb-1">下の数の桁数</label>
                        <select id="digits2"
                            class="bg-white border border-slate-300 rounded px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="1">1桁</option>
                            <option value="2" selected>2桁</option>
                            <option value="3">3桁</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="btn-refresh"
                        class="flex items-center gap-2 bg-white border border-indigo-200 text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-50 transition-colors shadow-sm">
                        <!-- RefreshCw Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="w-5 h-5">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        <span>再作成</span>
                    </button>
                    <button id="btn-print"
                        class="flex items-center gap-2 bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors shadow-sm">
                        <!-- Printer Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="w-5 h-5">
                            <polyline points="6 9 6 2 18 2 18 9"></polyline>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>
                        <span>印刷する</span>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div class="w-full overflow-x-auto print:overflow-visible p-4 print:p-0">

        <!-- ===== 印刷プレビュー 1枚目（問題） ===== -->
        <div
            class="bg-white shadow-2xl mx-auto rounded-sm w-[210mm] min-h-[297mm] p-12 print:shadow-none print:w-auto print:min-h-0 print:p-0 print:m-0">

            <div class="flex justify-between items-end border-b-2 border-slate-800 pb-2 mb-8">
                <h2 id="title-problems" class="text-2xl font-bold font-sans tracking-wide shrink-0 whitespace-nowrap">
                    たしざんの ひっさん</h2>
                <div class="text-lg tracking-widest font-serif flex gap-6 shrink-0 whitespace-nowrap ml-4">
                    <span>なまえ　　　　　　　　　　　　　　　　　　　　　　</span>
                </div>
            </div>

            <div id="problems-grid" class="grid grid-cols-4 gap-x-6 gap-y-12">
                <!-- 問題がここに挿入されます -->
            </div>

        </div>

        <!-- ===== 印刷プレビュー 2枚目（解答） ===== -->
        <div
            class="bg-white shadow-2xl mx-auto rounded-sm w-[210mm] min-h-[297mm] p-12 mt-12 print:mt-0 print:shadow-none print:w-auto print:min-h-0 print:p-0 print:m-0 print:break-before-page">

            <div class="flex justify-between items-end border-b-2 border-slate-800 pb-2 mb-8">
                <h2 id="title-answers"
                    class="text-2xl font-bold font-sans tracking-wide text-red-600 shrink-0 whitespace-nowrap">【こたえ】
                    たしざんの ひっさん</h2>
            </div>

            <div id="answers-grid" class="grid grid-cols-4 gap-x-6 gap-y-12">
                <!-- 解答がここに挿入されます -->
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 状態変数
            let operator = '+';
            let digits1 = 2;
            let digits2 = 2;
            const problemCount = 20;

            // DOM要素の取得
            const opRadios = document.querySelectorAll('input[name="operator"]');
            const digits1Select = document.getElementById('digits1');
            const digits2Select = document.getElementById('digits2');
            const btnRefresh = document.getElementById('btn-refresh');
            const btnPrint = document.getElementById('btn-print');

            const titleProblems = document.getElementById('title-problems');
            const titleAnswers = document.getElementById('title-answers');
            const problemsGrid = document.getElementById('problems-grid');
            const answersGrid = document.getElementById('answers-grid');

            // 乱数生成関数
            const getRandomNumber = (digits) => {
                const min = digits === 1 ? 1 : Math.pow(10, digits - 1);
                const max = Math.pow(10, digits) - 1;
                return Math.floor(Math.random() * (max - min + 1)) + min;
            };

            // タイトルを更新する関数
            const updateTitle = () => {
                const opName = operator === '+' ? 'たしざん' : operator === '-' ? 'ひきざん' : 'かけざん';
                const titleText = `${opName}の ひっさん （${digits1}けた・${digits2}けた）`;
                titleProblems.textContent = titleText;
                titleAnswers.textContent = `【こたえ】 ${titleText}`;
            };

            // 筆算のHTMLを生成する関数
            const createProblemHTML = (problem, showAnswer) => {
                const { id, num1, num2, answer, opSymbol } = problem;

                let maxResultDigits = 0;
                if (operator === '+') {
                    maxResultDigits = Math.max(digits1, digits2) + 1;
                } else if (operator === '-') {
                    maxResultDigits = Math.max(digits1, digits2);
                } else if (operator === '*') {
                    maxResultDigits = digits1 + digits2;
                }

                const totalCols = Math.max(maxResultDigits, digits1 + 1, digits2 + 2);

                const padToArray = (num, length) => String(num).padStart(length, ' ').split('');

                const arr1 = padToArray(num1, totalCols);
                const arr2 = padToArray(num2, totalCols - 1);
                arr2.unshift(opSymbol);
                const arrA = padToArray(answer, totalCols);

                const len2 = String(num2).length;
                let emptyLines = 1;
                if (operator === '*' && len2 > 1) {
                    emptyLines = len2 + 1;
                }

                let html = `
          <div class="flex flex-col w-fit break-inside-avoid">
            <div class="text-slate-500 font-bold mb-1 ml-2 font-sans">(${id})</div>
            <div class="flex flex-col text-3xl font-mono font-medium leading-none">
              
              <div class="flex">
                ${arr1.map(char => `<div class="w-7 text-center">${char === ' ' ? '&nbsp;' : char}</div>`).join('')}
              </div>

              <div class="flex mt-2">
                ${arr2.map(char => `<div class="w-7 text-center">${char === ' ' ? '&nbsp;' : char}</div>`).join('')}
              </div>

              <div class="border-b-4 border-slate-800 w-full mt-2 mb-2"></div>
        `;

                if (showAnswer) {
                    html += `<div class="flex flex-col">`;
                    for (let i = 0; i < emptyLines - 1; i++) {
                        html += `<div class="h-[30px] mt-2 w-full"></div>`;
                    }
                    html += `
            <div class="flex text-red-600 font-bold mt-2">
              ${arrA.map(char => `<div class="w-7 text-center">${char === ' ' ? '&nbsp;' : char}</div>`).join('')}
            </div>
          </div>`;
                } else {
                    html += `<div style="height: ${emptyLines * 30 + 8}px" class="w-full mt-2"></div>`;
                }

                html += `
            </div>
          </div>
        `;
                return html;
            };

            // 問題を生成して画面に描画する関数
            const generateProblems = () => {
                problemsGrid.innerHTML = '';
                answersGrid.innerHTML = '';
                updateTitle();

                for (let i = 0; i < problemCount; i++) {
                    let num1 = getRandomNumber(digits1);
                    let num2 = getRandomNumber(digits2);

                    if (operator === '-') {
                        if (num1 < num2) {
                            const temp = num1;
                            num1 = num2;
                            num2 = temp;
                        }
                    }

                    let answer = 0;
                    let opSymbol = '';
                    if (operator === '+') {
                        answer = num1 + num2;
                        opSymbol = '+';
                    } else if (operator === '-') {
                        answer = num1 - num2;
                        opSymbol = '-';
                    } else if (operator === '*') {
                        answer = num1 * num2;
                        opSymbol = '×';
                    }

                    const problem = { id: i + 1, num1, num2, answer, opSymbol };

                    problemsGrid.innerHTML += createProblemHTML(problem, false);
                    answersGrid.innerHTML += createProblemHTML(problem, true);
                }
            };

            // イベントリスナーの登録
            opRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    operator = e.target.value;
                    generateProblems();
                });
            });

            digits1Select.addEventListener('change', (e) => {
                digits1 = Number(e.target.value);
                generateProblems();
            });

            digits2Select.addEventListener('change', (e) => {
                digits2 = Number(e.target.value);
                generateProblems();
            });

            btnRefresh.addEventListener('click', generateProblems);

            btnPrint.addEventListener('click', () => {
                window.print();
            });

            // 初回生成
            generateProblems();
        });
    </script>
</body>

</html>
