<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筆算ドリルメーカー</title>
    <!-- Tailwind CSS をCDNから読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --sheet-width: 210mm;
            --sheet-height: 297mm;
            --print-page-margin: 8mm;
            --screen-page-padding: 12mm;
            --print-safe-width-adjust: 3mm;
            --print-safe-height-adjust: 5mm;
            --print-content-width: calc(var(--sheet-width) - (var(--print-page-margin) * 2) - var(--print-safe-width-adjust));
            --print-content-height: calc(var(--sheet-height) - (var(--print-page-margin) * 2) - var(--print-safe-height-adjust));
            --screen-answer-space-row-height: 30px;
            --screen-answer-space-extra: 8px;
            --print-page-padding-block: 4.8mm;
            --print-page-padding-inline: 5.4mm;
            --print-header-margin-bottom: 3.4mm;
            --print-header-padding-bottom: 1.8mm;
            --print-title-font-size: 18px;
            --print-grid-column-gap: 2.1mm;
            --print-grid-row-gap: 3.6mm;
            --print-problem-font-size: 8.8mm;
            --print-digit-cell-width: 8.8mm;
            --print-problem-number-font-size: 3.9mm;
            --print-problem-row-gap: 1.8mm;
            --print-answer-space-row-height: 8.1mm;
            --print-answer-space-extra: 1.8mm;
        }

        .worksheet-preview {
            width: fit-content;
            max-width: 100%;
            margin: 0 auto;
        }

        .worksheet-page {
            width: var(--sheet-width);
            min-height: var(--sheet-height);
            padding: var(--screen-page-padding);
            box-sizing: border-box;
            flex-shrink: 0;
            transform-origin: top left;
        }

        .worksheet-page-content {
            width: 100%;
        }

        .problem-second-row,
        .problem-rule,
        .problem-answer-row,
        .problem-answer-space {
            margin-top: 0.5rem;
        }

        .problem-rule {
            margin-bottom: 0.5rem;
        }

        .problem-answer-space {
            height: calc(var(--problem-empty-lines, 1) * var(--screen-answer-space-row-height) + var(--screen-answer-space-extra));
        }

        body.is-printing {
            background-color: white;
        }

        body.is-printing .print-stage {
            padding: 0;
            overflow: visible;
        }

        body.is-printing .worksheet-preview {
            width: auto;
            max-width: none;
            height: auto;
            margin: 0 auto;
        }

        body.is-printing .worksheet-page {
            width: var(--print-content-width);
            min-height: var(--print-content-height);
            height: var(--print-content-height);
            margin: 0 auto;
            padding: var(--print-page-padding-block) var(--print-page-padding-inline);
            border-radius: 0;
            box-shadow: none !important;
            overflow: hidden;
            transform: none !important;
        }

        body.is-printing .worksheet-page-content {
            width: calc(100% / var(--print-fit-scale, 1));
            transform: scale(var(--print-fit-scale, 1));
            transform-origin: top left;
        }

        body.is-printing .worksheet-header {
            margin-bottom: var(--print-header-margin-bottom);
            padding-bottom: var(--print-header-padding-bottom);
        }

        body.is-printing .worksheet-title {
            font-size: var(--print-title-font-size);
            line-height: 1.25;
        }

        body.is-printing .worksheet-grid {
            gap: var(--print-grid-row-gap) var(--print-grid-column-gap);
        }

        body.is-printing .worksheet-problem-number {
            font-size: var(--print-problem-number-font-size);
            line-height: 1.1;
            margin-bottom: 1.2mm;
            margin-left: 1.8mm;
        }

        body.is-printing .problem-stack {
            font-size: var(--print-problem-font-size);
            line-height: 1;
        }

        body.is-printing .problem-second-row,
        body.is-printing .problem-answer-row,
        body.is-printing .problem-answer-space {
            margin-top: var(--print-problem-row-gap);
        }

        body.is-printing .digit-cell {
            width: var(--print-digit-cell-width);
        }

        body.is-printing .problem-rule {
            margin-top: var(--print-problem-row-gap);
            margin-bottom: var(--print-problem-row-gap);
            border-bottom-width: 1mm;
        }

        body.is-printing .problem-answer-space {
            height: calc(var(--problem-empty-lines, 1) * var(--print-answer-space-row-height) + var(--print-answer-space-extra));
            margin-top: var(--print-problem-row-gap);
        }

        body.is-printing[data-print-target="problems"] .worksheet-preview[data-print-target="answers"],
        body.is-printing[data-print-target="answers"] .worksheet-preview[data-print-target="problems"] {
            display: none;
        }

        /* 印刷時のスタイル調整 */
        @media print {
            @page {
                size: A4 portrait;
                margin: var(--print-page-margin);
            }

            html,
            body {
                width: auto;
                margin: 0;
                padding: 0;
            }

            html {
                font-size: 15px;
            }

            html.is-ios-print-device {
                font-size: 14px;
            }

            body {
                background-color: white !important;
            }

            .print-stage {
                padding: 0 !important;
                overflow: visible !important;
            }

            .worksheet-preview {
                width: auto !important;
                max-width: none !important;
                height: auto !important;
                margin: 0 !important;
            }

            body[data-print-target="problems"] .worksheet-preview[data-print-target="answers"],
            body[data-print-target="answers"] .worksheet-preview[data-print-target="problems"] {
                display: none !important;
            }

            .worksheet-page {
                break-inside: avoid;
                page-break-inside: avoid;
                page-break-after: always;
                break-after: page;
            }

            .worksheet-page:last-child {
                page-break-after: auto;
                break-after: auto;
            }

            .worksheet-problem {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>

<body class="min-h-screen bg-slate-100 print:bg-white text-gray-800 font-sans pb-12">

    <!-- ===== コントロールパネル（印刷時は非表示） ===== -->
    <div class="print:hidden sticky top-0 z-10 bg-white shadow-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">

                <div class="flex items-center gap-2 text-indigo-600 font-bold text-xl">
                    <!-- FileText Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="w-6 h-6">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <line x1="10" y1="9" x2="8" y2="9"></line>
                    </svg>
                    <h1>筆算ドリルメーカー</h1>
                </div>

                <div class="flex flex-wrap items-end gap-4 text-sm bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <!-- 演算子選択 -->
                    <div class="flex flex-col">
                        <label class="text-xs text-slate-500 font-semibold mb-1 flex items-center gap-1">
                            <!-- Settings Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="w-3 h-3">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path
                                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                                </path>
                            </svg>
                            計算の種類
                        </label>
                        <div class="flex gap-2">
                            <label
                                class="flex items-center gap-1 bg-white px-3 py-1.5 rounded border border-slate-300 cursor-pointer hover:bg-slate-50 transition-colors">
                                <input type="radio" name="operator" value="+" checked class="text-indigo-600" />

                            </label>
                            <label
                                class="flex items-center gap-1 bg-white px-3 py-1.5 rounded border border-slate-300 cursor-pointer hover:bg-slate-50 transition-colors">
                                <input type="radio" name="operator" value="-" class="text-indigo-600" />
                                <span class="font-bold text-lg leading-none mt-1">−</span>
                            </label>
                            <label
                                class="flex items-center gap-1 bg-white px-3 py-1.5 rounded border border-slate-300 cursor-pointer hover:bg-slate-50 transition-colors">
                                <input type="radio" name="operator" value="*" class="text-indigo-600" />
                                <span class="font-bold text-lg leading-none mt-1">×</span>
                            </label>
                        </div>
                    </div>

                    <!-- 桁数選択（上の数） -->
                    <div class="flex flex-col">
                        <label class="text-xs text-slate-500 font-semibold mb-1">上の数の桁数</label>
                        <select id="digits1"
                            class="bg-white border border-slate-300 rounded px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="1">1桁</option>
                            <option value="2" selected>2桁</option>
                            <option value="3">3桁</option>
                        </select>
                    </div>

                    <!-- 桁数選択（下の数） -->
                    <div class="flex flex-col">
                        <label class="text-xs text-slate-500 font-semibold mb-1">下の数の桁数</label>
                        <select id="digits2"
                            class="bg-white border border-slate-300 rounded px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="1">1桁</option>
                            <option value="2" selected>2桁</option>
                            <option value="3">3桁</option>
                        </select>
                    </div>

                    <div class="flex flex-col min-w-44">
                        <label for="title-prefix" class="text-xs text-slate-500 font-semibold mb-1">「○○用」の名前</label>
                        <input id="title-prefix" type="text" placeholder="例: たろう"
                            class="bg-white border border-slate-300 rounded px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
                    </div>
                </div>

                <div class="flex flex-wrap gap-2">
                    <button id="btn-refresh"
                        class="flex items-center gap-2 bg-white border border-indigo-200 text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-50 transition-colors shadow-sm">
                        <!-- RefreshCw Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="w-5 h-5">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        <span>再作成</span>
                    </button>
                    <button id="btn-print-problems"
                        class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors shadow-sm">
                        <!-- Printer Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="w-5 h-5">
                            <polyline points="6 9 6 2 18 2 18 9"></polyline>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>
                        <span>問題を印刷</span>
                    </button>
                    <button id="btn-print-answers"
                        class="flex items-center gap-2 bg-rose-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-rose-700 transition-colors shadow-sm">
                        <!-- Printer Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="w-5 h-5">
                            <polyline points="6 9 6 2 18 2 18 9"></polyline>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>
                        <span>答えを印刷</span>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div class="print-stage w-full overflow-x-auto print:overflow-visible p-4 print:p-0">

        <!-- ===== 印刷プレビュー 1枚目（問題） ===== -->
        <div class="worksheet-preview" data-print-target="problems">
            <div id="problem-page"
                class="worksheet-page bg-white shadow-2xl mx-auto rounded-sm print:shadow-none print:m-0">
                <div class="worksheet-page-content">
                    <div class="worksheet-header border-b-2 border-slate-800 pb-2 mb-8">
                        <h2 id="title-problems" class="worksheet-title text-2xl font-bold font-sans tracking-wide">
                            たしざんの ひっさん</h2>
                    </div>

                    <div id="problems-grid" class="worksheet-grid grid grid-cols-4 gap-x-6 gap-y-12">
                        <!-- 問題がここに挿入されます -->
                    </div>
                </div>
            </div>

        </div>

        <!-- ===== 印刷プレビュー 2枚目（解答） ===== -->
        <div class="worksheet-preview mt-12 print:mt-0" data-print-target="answers">
            <div id="answer-page"
                class="worksheet-page bg-white shadow-2xl mx-auto rounded-sm print:shadow-none print:m-0">
                <div class="worksheet-page-content">
                    <div class="worksheet-header flex justify-between items-end border-b-2 border-slate-800 pb-2 mb-8">
                        <h2 id="title-answers"
                            class="worksheet-title text-2xl font-bold font-sans tracking-wide text-red-600 shrink-0 whitespace-nowrap">
                            【こたえ】
                            たしざんの ひっさん</h2>
                    </div>

                    <div id="answers-grid" class="worksheet-grid grid grid-cols-4 gap-x-6 gap-y-12">
                        <!-- 解答がここに挿入されます -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const MIN_DIGITS_FOR_COMPACT_PROFILE = 3;
            const MINIMUM_ACCEPTABLE_PRINT_SCALE = 0.94;
            const PRINT_SCALE_PRECISION = 4;
            const PRINT_PROFILE_VARIABLES = {
                spacious: {
                    '--print-page-padding-block': '4.8mm',
                    '--print-page-padding-inline': '5.4mm',
                    '--print-header-margin-bottom': '3.4mm',
                    '--print-header-padding-bottom': '1.8mm',
                    '--print-title-font-size': '18px',
                    '--print-grid-column-gap': '2.1mm',
                    '--print-grid-row-gap': '3.6mm',
                    '--print-problem-font-size': '8.8mm',
                    '--print-digit-cell-width': '8.8mm',
                    '--print-problem-number-font-size': '3.9mm',
                    '--print-problem-row-gap': '1.8mm',
                    '--print-answer-space-row-height': '8.1mm',
                    '--print-answer-space-extra': '1.8mm'
                },
                compact: {
                    '--print-page-padding-block': '4.3mm',
                    '--print-page-padding-inline': '4.8mm',
                    '--print-header-margin-bottom': '3mm',
                    '--print-header-padding-bottom': '1.6mm',
                    '--print-title-font-size': '16.5px',
                    '--print-grid-column-gap': '1.7mm',
                    '--print-grid-row-gap': '3.1mm',
                    '--print-problem-font-size': '8.1mm',
                    // Slightly reduce the compact digit width to keep 3-digit and multiplication layouts on one page.
                    '--print-digit-cell-width': '8.15mm',
                    '--print-problem-number-font-size': '3.6mm',
                    '--print-problem-row-gap': '1.5mm',
                    '--print-answer-space-row-height': '7.4mm',
                    '--print-answer-space-extra': '1.5mm'
                }
            };

            const isIOSPrintDevice = /iP(hone|ad|od)/.test(window.navigator.userAgent)
                || (window.navigator.platform === 'MacIntel' && window.navigator.maxTouchPoints > 1);

            if (isIOSPrintDevice) {
                document.documentElement.classList.add('is-ios-print-device');
            }

            // 状態変数
            let operator = '+';
            let digits1 = 2;
            let digits2 = 2;
            let titlePrefix = '';

            // DOM要素の取得
            const opRadios = document.querySelectorAll('input[name="operator"]');
            const digits1Select = document.getElementById('digits1');
            const digits2Select = document.getElementById('digits2');
            const titlePrefixInput = document.getElementById('title-prefix');
            const btnRefresh = document.getElementById('btn-refresh');
            const btnPrintProblems = document.getElementById('btn-print-problems');
            const btnPrintAnswers = document.getElementById('btn-print-answers');

            const titleProblems = document.getElementById('title-problems');
            const titleAnswers = document.getElementById('title-answers');
            const problemPage = document.getElementById('problem-page');
            const answerPage = document.getElementById('answer-page');
            const problemsGrid = document.getElementById('problems-grid');
            const answersGrid = document.getElementById('answers-grid');
            const printStage = document.querySelector('.print-stage');
            const previewWrappers = document.querySelectorAll('.worksheet-preview');
            const worksheetPages = document.querySelectorAll('.worksheet-page');
            const printMediaQuery = window.matchMedia('print');

            let isPreparingPrint = false;
            let activePrintTarget = 'all';

            // 乱数生成関数
            const getRandomNumber = (digits) => {
                const min = digits === 1 ? 1 : Math.pow(10, digits - 1);
                const max = Math.pow(10, digits) - 1;
                return Math.floor(Math.random() * (max - min + 1)) + min;
            };

            // タイトルを更新する関数
            const updateTitle = () => {
                const opName = operator === '+' ? 'たしざん' : operator === '-' ? 'ひきざん' : 'かけざん';
                const titleCore = `${opName}の ひっさん （${digits1}けた・${digits2}けた）`;
                const titleText = titlePrefix ? `${titlePrefix}用 ${titleCore}` : titleCore;
                titleProblems.textContent = titleText;
                titleAnswers.textContent = `【こたえ】 ${titleText}`;
                document.title = titleText;
            };

            const getProblemCount = () => operator === '*' ? 16 : 20;

            const getPreferredPrintProfile = () => {
                const needsCompactProfile = operator === '*'
                    || Math.max(digits1, digits2) >= MIN_DIGITS_FOR_COMPACT_PROFILE;
                return needsCompactProfile ? 'compact' : 'spacious';
            };

            const applyPrintProfile = (profileName) => {
                const profile = PRINT_PROFILE_VARIABLES[profileName] || PRINT_PROFILE_VARIABLES.spacious;
                Object.entries(profile).forEach(([property, value]) => {
                    document.documentElement.style.setProperty(property, value);
                });
            };

            const clearPrintFitScale = () => {
                worksheetPages.forEach((page) => {
                    page.style.removeProperty('--print-fit-scale');
                });
            };

            const resetPreviewScale = () => {
                previewWrappers.forEach((wrapper) => {
                    wrapper.style.width = 'auto';
                    wrapper.style.height = 'auto';
                });

                worksheetPages.forEach((page) => {
                    page.style.transform = 'none';
                });
            };

            const normalizePrintTarget = (target) => {
                return target === 'problems' || target === 'answers' ? target : 'all';
            };

            const setPrintTarget = (target = 'all') => {
                activePrintTarget = normalizePrintTarget(target);

                if (activePrintTarget === 'all') {
                    delete document.body.dataset.printTarget;
                    return;
                }

                document.body.dataset.printTarget = activePrintTarget;
            };

            const enterPrintLayout = (target = activePrintTarget) => {
                isPreparingPrint = true;
                setPrintTarget(target);
                document.body.classList.add('is-printing');
                resetPreviewScale();
            };

            const leavePrintLayout = () => {
                isPreparingPrint = false;
                setPrintTarget('all');
                document.body.classList.remove('is-printing');
                clearPrintFitScale();
                updatePreviewScale();
            };

            const updatePreviewScale = () => {
                if (!printStage) {
                    return;
                }

                if (printMediaQuery.matches || isPreparingPrint) {
                    resetPreviewScale();
                    return;
                }

                const stageStyle = window.getComputedStyle(printStage);
                const stagePaddingLeft = parseFloat(stageStyle.paddingLeft) || 0;
                const stagePaddingRight = parseFloat(stageStyle.paddingRight) || 0;
                const availableWidth = printStage.clientWidth - stagePaddingLeft - stagePaddingRight;

                worksheetPages.forEach((page, index) => {
                    page.style.transform = 'none';

                    const naturalWidth = page.offsetWidth;
                    const naturalHeight = page.offsetHeight;
                    const scale = naturalWidth > 0 ? Math.min(1, availableWidth / naturalWidth) : 1;

                    const wrapper = previewWrappers[index];
                    if (wrapper) {
                        wrapper.style.width = `${naturalWidth * scale}px`;
                        wrapper.style.height = `${naturalHeight * scale}px`;
                    }

                    page.style.transform = `scale(${scale})`;
                });
            };

            const flushPrintLayout = () => {
                if (printStage) {
                    printStage.getBoundingClientRect();
                }

                worksheetPages.forEach((page) => {
                    page.getBoundingClientRect();
                });
            };

            const getVisibleWorksheetPages = () => {
                return Array.from(worksheetPages).filter((page) => {
                    const preview = page.closest('.worksheet-preview');
                    return preview && preview.offsetParent !== null;
                });
            };

            const getPageContentBounds = (page, pageStyle) => {
                const paddingLeft = parseFloat(pageStyle.paddingLeft) || 0;
                const paddingRight = parseFloat(pageStyle.paddingRight) || 0;
                const paddingTop = parseFloat(pageStyle.paddingTop) || 0;
                const paddingBottom = parseFloat(pageStyle.paddingBottom) || 0;

                return {
                    availableWidth: page.clientWidth - paddingLeft - paddingRight,
                    availableHeight: page.clientHeight - paddingTop - paddingBottom
                };
            };

            const measurePrintFitScales = () => {
                return getVisibleWorksheetPages().map((page) => {
                    const content = page.querySelector('.worksheet-page-content');
                    if (!content) {
                        return { page, scale: 1 };
                    }

                    const pageStyle = window.getComputedStyle(page);
                    const { availableWidth, availableHeight } = getPageContentBounds(page, pageStyle);
                    // Width measurement can fluctuate between offsetWidth and scrollWidth before and after the print scale transform, so use the larger value.
                    const contentWidth = Math.max(content.scrollWidth, content.offsetWidth);
                    const contentHeight = content.scrollHeight;
                    const fittedScale = Math.min(
                        1,
                        availableWidth > 0 ? availableWidth / contentWidth : 1,
                        availableHeight > 0 ? availableHeight / contentHeight : 1
                    );

                    return {
                        page,
                        scale: Number.isFinite(fittedScale) && fittedScale > 0 ? fittedScale : 1
                    };
                });
            };

            const optimizePrintLayout = () => {
                const preferredProfile = getPreferredPrintProfile();
                const profileCandidates = preferredProfile === 'spacious'
                    ? ['spacious', 'compact']
                    : ['compact'];

                let measuredScales = [];

                clearPrintFitScale();
                profileCandidates.some((profileName, index) => {
                    applyPrintProfile(profileName);
                    flushPrintLayout();
                    measuredScales = measurePrintFitScales();
                    const minimumScale = measuredScales.reduce(
                        (minimumValue, { scale }) => Math.min(minimumValue, scale),
                        1
                    );

                    // Accept the last candidate as a fallback, even when it still needs extra shrinking, to prevent printed content from overflowing the page.
                    return minimumScale >= MINIMUM_ACCEPTABLE_PRINT_SCALE || index === profileCandidates.length - 1;
                });

                measuredScales.forEach(({ page, scale }) => {
                    page.style.setProperty('--print-fit-scale', Math.min(1, scale).toFixed(PRINT_SCALE_PRECISION));
                });

                flushPrintLayout();
            };

            // 筆算のHTMLを生成する関数
            const createProblemHTML = (problem, showAnswer) => {
                const { id, num1, num2, answer, opSymbol } = problem;

                let maxResultDigits = 0;
                if (operator === '+') {
                    maxResultDigits = Math.max(digits1, digits2) + 1;
                } else if (operator === '-') {
                    maxResultDigits = Math.max(digits1, digits2);
                } else if (operator === '*') {
                    maxResultDigits = digits1 + digits2;
                }

                const totalCols = Math.max(maxResultDigits, digits1 + 1, digits2 + 2);

                const padToArray = (num, length) => String(num).padStart(length, ' ').split('');

                const arr1 = padToArray(num1, totalCols);
                const arr2 = padToArray(num2, totalCols - 1);
                arr2.unshift(opSymbol);
                const arrA = padToArray(answer, totalCols);

                const len2 = String(num2).length;
                let problemEmptyLines = 1;
                if (operator === '*' && len2 > 1) {
                    problemEmptyLines = len2;
                }

                let html = `
                    <div class="worksheet-problem flex flex-col w-fit break-inside-avoid">
                        <div class="worksheet-problem-number text-slate-500 font-bold mb-1 ml-2 font-sans">(${id})</div>
                        <div class="problem-stack flex flex-col text-3xl font-mono font-medium leading-none">

              <div class="problem-row flex">
                ${arr1.map(char => `<div class="digit-cell w-7 text-center">${char === ' ' ? '&nbsp;' : char}</div>`).join('')}
              </div>

              <div class="problem-row problem-second-row flex">
                ${arr2.map(char => `<div class="digit-cell w-7 text-center">${char === ' ' ? '&nbsp;' : char}</div>`).join('')}
              </div>

              <div class="problem-rule border-b-4 border-slate-800 w-full"></div>
        `;

                if (showAnswer) {
                    html += `<div class="flex flex-col">`;
                    html += `
            <div class="problem-row problem-answer-row flex text-red-600 font-bold">
              ${arrA.map(char => `<div class="digit-cell w-7 text-center">${char === ' ' ? '&nbsp;' : char}</div>`).join('')}
            </div>
          </div>`;
                } else {
                    html += `<div class="problem-answer-space w-full" style="--problem-empty-lines: ${problemEmptyLines};"></div>`;
                }

                html += `
            </div>
          </div>
        `;
                return html;
            };

            // 問題を生成して画面に描画する関数
            const generateProblems = () => {
                problemsGrid.innerHTML = '';
                answersGrid.innerHTML = '';
                updateTitle();
                const problemCount = getProblemCount();
                const isMultiplication = operator === '*';

                problemPage.classList.toggle('is-multiplication', isMultiplication);
                answerPage.classList.toggle('is-multiplication', isMultiplication);

                for (let i = 0; i < problemCount; i++) {
                    let num1 = getRandomNumber(digits1);
                    let num2 = getRandomNumber(digits2);

                    if (operator === '-') {
                        if (num1 < num2) {
                            const temp = num1;
                            num1 = num2;
                            num2 = temp;
                        }
                    }

                    let answer = 0;
                    let opSymbol = '';
                    if (operator === '+') {
                        answer = num1 + num2;
                        opSymbol = '+';
                    } else if (operator === '-') {
                        answer = num1 - num2;
                        opSymbol = '-';
                    } else if (operator === '*') {
                        answer = num1 * num2;
                        opSymbol = '×';
                    }

                    const problem = { id: i + 1, num1, num2, answer, opSymbol };

                    problemsGrid.innerHTML += createProblemHTML(problem, false);
                    answersGrid.innerHTML += createProblemHTML(problem, true);
                }

                updatePreviewScale();
            };

            // イベントリスナーの登録
            opRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    operator = e.target.value;
                    generateProblems();
                });
            });

            digits1Select.addEventListener('change', (e) => {
                digits1 = Number(e.target.value);
                generateProblems();
            });

            digits2Select.addEventListener('change', (e) => {
                digits2 = Number(e.target.value);
                generateProblems();
            });

            titlePrefixInput.addEventListener('input', (e) => {
                titlePrefix = e.target.value.trim();
                updateTitle();
            });

            btnRefresh.addEventListener('click', generateProblems);

            const startPrint = (target) => {
                if (printMediaQuery.matches || isPreparingPrint) {
                    return;
                }

                enterPrintLayout(target);
                optimizePrintLayout();

                if (isIOSPrintDevice) {
                    window.print();
                    return;
                }

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        window.print();
                    });
                });
            };

            btnPrintProblems.addEventListener('click', () => {
                startPrint('problems');
            });

            btnPrintAnswers.addEventListener('click', () => {
                startPrint('answers');
            });

            window.addEventListener('resize', updatePreviewScale);
            window.addEventListener('beforeprint', () => {
                enterPrintLayout();
                optimizePrintLayout();
            });
            window.addEventListener('afterprint', leavePrintLayout);

            const handlePrintMediaChange = (event) => {
                if (event.matches) {
                    enterPrintLayout();
                    optimizePrintLayout();
                    return;
                }

                leavePrintLayout();
            };

            if (typeof printMediaQuery.addEventListener === 'function') {
                printMediaQuery.addEventListener('change', handlePrintMediaChange);
            } else if (typeof printMediaQuery.addListener === 'function') {
                printMediaQuery.addListener(handlePrintMediaChange);
            }

            // 初回生成
            generateProblems();
        });
    </script>
</body>

</html>
